<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blue Motion Charter · Panel de Administración</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#0A3D6B;
  --navy-light:#1565A0;
  --blue:#1E88E5;
  --cyan:#0097A7;
  --cream:#FAFAF8;
  --sand:#F5F0E8;
  --white:#FFFFFF;
  --text:#1C1C1C;
  --text-muted:#6B7280;
  --border:#E5E7EB;
}
body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--text);font-size:14px}

/* TOPBAR — igual que el nav de la web */
.topbar{background:rgba(10,61,107,0.97);backdrop-filter:blur(10px);color:white;padding:0.9rem 2rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.1);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.15)}
.topbar-logo{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:400;letter-spacing:0.02em}
.topbar-logo span{font-style:italic;color:#64B5F6}
.topbar-sub{font-size:0.72rem;color:rgba(255,255,255,0.5);margin-top:3px;letter-spacing:0.04em}
.topbar-right{font-size:0.75rem;color:rgba(255,255,255,0.55);text-align:right}
.topbar-badge{display:inline-block;background:var(--cyan);color:white;font-size:0.65rem;padding:0.2rem 0.6rem;border-radius:2px;letter-spacing:0.06em;font-weight:500;margin-top:4px}

/* CONTENT */
.content{padding:2rem;max-width:1200px;margin:0 auto}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem}
.stat-card{background:var(--white);border-radius:4px;padding:1.4rem 1.5rem;box-shadow:0 1px 4px rgba(0,0,0,0.05);border-left:3px solid var(--color);border-top:1px solid var(--border);border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.stat-card.navy{--color:#0A3D6B}
.stat-card.blue{--color:#1E88E5}
.stat-card.cyan{--color:#0097A7}
.stat-card.green{--color:#0097A7}
.stat-num{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:400;color:var(--navy);line-height:1}
.stat-label{font-size:0.68rem;color:var(--text-muted);margin-top:6px;text-transform:uppercase;letter-spacing:0.12em;font-weight:500}
.stat-sub{font-size:0.75rem;color:#9CA3AF;margin-top:6px}

/* SECTION TITLE */
.section-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:400;color:var(--navy);margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem}
.section-title em{font-style:italic;color:var(--cyan)}

/* TABLA */
.table-wrap{background:var(--white);border-radius:4px;border:1px solid var(--border);overflow:hidden;margin-bottom:2rem;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
table{width:100%;border-collapse:collapse}
thead{background:var(--navy)}
thead th{color:rgba(255,255,255,0.85);font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;padding:11px 16px;text-align:left;font-weight:500}
tbody tr{border-bottom:1px solid #F3F4F6;transition:background 0.15s}
tbody tr:hover{background:var(--sand)}
tbody tr:last-child{border-bottom:none}
td{padding:11px 16px;font-size:0.84rem;color:#4A4A4A;vertical-align:middle}
td strong{color:var(--navy);font-weight:600}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:2px;font-size:0.7rem;font-weight:500;letter-spacing:0.04em}
.badge.confirmada{background:#DBEAFE;color:#1565A0}
.badge.cancelada{background:#FEE2E2;color:#B91C1C}
.badge.medio_dia{background:#E0F7FA;color:#006064}
.badge.dia_completo{background:#E3F2FD;color:#0A3D6B}
.badge.puesta_de_sol{background:#FFF3E0;color:#E65100}

/* BOTONES */
.btn-cancel{background:transparent;border:1px solid var(--border);padding:4px 12px;border-radius:2px;font-size:0.73rem;cursor:pointer;color:var(--text-muted);transition:all 0.2s;font-family:inherit}
.btn-cancel:hover{border-color:#EF4444;color:#EF4444;background:#FEF2F2}
.refresh-btn{background:var(--navy);color:white;border:none;padding:0.48rem 1.1rem;border-radius:2px;font-size:0.78rem;cursor:pointer;font-family:inherit;transition:background 0.2s;font-weight:500;letter-spacing:0.04em}
.refresh-btn:hover{background:var(--blue)}

/* FILTROS */
.filter-row{display:flex;gap:0.75rem;margin-bottom:1rem;align-items:center;flex-wrap:wrap}
.filter-select{background:var(--white);border:1px solid var(--border);padding:0.42rem 0.85rem;border-radius:2px;font-size:0.8rem;font-family:inherit;color:var(--text-muted);outline:none;transition:border-color 0.2s}
.filter-select:focus{border-color:var(--navy)}

/* PATRÓN BADGE */
.patron-badge{font-size:0.75rem;color:var(--cyan);font-weight:500}

/* EMPTY */
.empty{text-align:center;padding:3rem;color:#9CA3AF;font-size:0.88rem}

/* MOBILE */
@media(max-width:768px){
  .topbar{padding:0.75rem 1rem}
  .topbar-logo{font-size:1rem}
  .stats-grid{grid-template-columns:1fr 1fr}
  .content{padding:1rem}
  .filter-row{flex-direction:column;align-items:stretch}
  table{font-size:0.76rem}
  thead th,td{padding:8px 10px}
  .stat-num{font-size:1.7rem}
}
</style>
</head>
<body>
<div class="topbar">
  <div>
    <div class="topbar-logo"><span>Blue Motion</span> Charter</div>
    <div class="topbar-sub">Panel de Administración &middot; Naviera Balear, Palma</div>
  </div>
  <div style="text-align:right">
    <div class="topbar-right" id="lastUpdate">Cargando...</div>
    <div class="topbar-badge">Admin</div>
  </div>
</div>

<div class="content">
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card navy"><div class="stat-num" id="statTotal">-</div><div class="stat-label">Reservas totales</div></div>
    <div class="stat-card blue"><div class="stat-num" id="statHoy">-</div><div class="stat-label">Reservas hoy</div></div>
    <div class="stat-card cyan"><div class="stat-num" id="statProximas">-</div><div class="stat-label">Pr&oacute;ximas salidas</div></div>
    <div class="stat-card green"><div class="stat-num" id="statIngresos">-</div><div class="stat-label">Ingresos estimados</div></div>
  </div>

  <div class="section-title">&#9875; Reservas de <em>excursiones</em></div>

  <div class="filter-row">
    <select class="filter-select" id="filtroEstado" onchange="renderTabla()">
      <option value="">Todos los estados</option>
      <option value="confirmada">Confirmadas</option>
      <option value="cancelada">Canceladas</option>
    </select>
    <select class="filter-select" id="filtroExc" onchange="renderTabla()">
      <option value="">Todas las excursiones</option>
      <option value="medio_dia">Medio d&iacute;a</option>
      <option value="dia_completo">D&iacute;a completo</option>
      <option value="puesta_de_sol">Puesta de sol</option>
    </select>
    <button class="refresh-btn" onclick="cargar()">&#8635; Actualizar</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Cliente</th>
          <th>Excursi&oacute;n</th>
          <th>Fecha</th>
          <th>Personas</th>
          <th>Patr&oacute;n</th>
          <th>Contacto</th>
          <th>Estado</th>
          <th>Acci&oacute;n</th>
        </tr>
      </thead>
      <tbody id="tablaBody">
        <tr><td colspan="9" class="empty">Cargando reservas...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
var BASE = window.location.origin;
var reservas = [];

var EXC_NAMES = {
  medio_dia: 'Medio d\u00eda (4h)',
  dia_completo: 'D\u00eda completo (8h)',
  puesta_de_sol: 'Puesta de sol (3h)'
};

var EXC_PRECIOS = { medio_dia: 350, dia_completo: 650, puesta_de_sol: 280 };

function cargar() {
  fetch(BASE + '/reservas')
    .then(function(r){ return r.json(); })
    .then(function(data){
      reservas = data;
      actualizarStats();
      renderTabla();
      document.getElementById('lastUpdate').textContent = 'Actualizado: ' + new Date().toLocaleTimeString('es-ES');
    })
    .catch(function(){
      document.getElementById('tablaBody').innerHTML = '<tr><td colspan="9" class="empty">Error al cargar. Comprueba la conexi\u00f3n.</td></tr>';
    });
}

function actualizarStats() {
  var hoy = new Date().toISOString().split('T')[0];
  var confirmadas = reservas.filter(function(r){ return r.estado !== 'cancelada'; });
  var hoyReservas = confirmadas.filter(function(r){ return r.fecha === hoy; });
  var proximas = confirmadas.filter(function(r){ return r.fecha >= hoy; });
  var ingresos = confirmadas.reduce(function(sum, r){
    return sum + (EXC_PRECIOS[r.tipo_excursion] || 0);
  }, 0);

  document.getElementById('statTotal').textContent = reservas.length;
  document.getElementById('statHoy').textContent = hoyReservas.length;
  document.getElementById('statProximas').textContent = proximas.length;
  document.getElementById('statIngresos').textContent = ingresos.toLocaleString('es-ES') + '\u20ac';
}

function renderTabla() {
  var filtroEstado = document.getElementById('filtroEstado').value;
  var filtroExc = document.getElementById('filtroExc').value;
  var filtradas = reservas.filter(function(r){
    if (filtroEstado && r.estado !== filtroEstado) return false;
    if (filtroExc && r.tipo_excursion !== filtroExc) return false;
    return true;
  });

  if (filtradas.length === 0) {
    document.getElementById('tablaBody').innerHTML = '<tr><td colspan="9" class="empty">\u26f5 No hay reservas que mostrar</td></tr>';
    return;
  }

  var html = filtradas.map(function(r) {
    var excName = EXC_NAMES[r.tipo_excursion] || r.tipo_excursion;
    var patron = r.con_patron ? '\u2714 Incluido' : '\u2715 Licencia propia';
    var cancelBtn = r.estado !== 'cancelada'
      ? '<button class="btn-cancel" onclick="cancelar(' + r.id + ')">Cancelar</button>'
      : '<span style="color:#9CA3AF;font-size:0.75rem;">-</span>';

    return '<tr>' +
      '<td><strong>#BM-' + r.id + '</strong></td>' +
      '<td>' + r.nombre + '</td>' +
      '<td><span class="badge ' + r.tipo_excursion + '">' + excName + '</span></td>' +
      '<td>' + r.fecha + '</td>' +
      '<td style="text-align:center">' + r.personas + '</td>' +
      '<td><span class="patron-badge">' + patron + '</span></td>' +
      '<td style="font-size:0.78rem;">' + (r.email || '-') + '<br><span style="color:#9CA3AF">' + (r.telefono || '') + '</span></td>' +
      '<td><span class="badge ' + r.estado + '">' + (r.estado === 'confirmada' ? 'Confirmada' : 'Cancelada') + '</span></td>' +
      '<td>' + cancelBtn + '</td>' +
      '</tr>';
  }).join('');

  document.getElementById('tablaBody').innerHTML = html;
}

function cancelar(id) {
  if (!confirm('\u00bfCancelar la reserva #BM-' + id + '?')) return;
  fetch(BASE + '/reservas/' + id + '/cancelar', { method: 'PATCH' })
    .then(function(){ cargar(); })
    .catch(function(){ alert('Error al cancelar'); });
}

cargar();
setInterval(cargar, 30000);
</script>
</body>
</html>
